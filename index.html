<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
        }
        .wrap{
            width:100%;
            max-width:640px;
            height:1768px;       
        } 
        
        /* 헤더의 시작 */
        .header{
            width:360px;
            height:56px;
            background:#01c982;
        }
        .logo{
            text-align:center;
            font-family:'Noto Sans KR';
            font-weight:900;
            font-size:32px;
            padding-top:3px;
        }      
        .logo>a{
            color:#ffffff;
            text-decoration:none;
        }
        .btn-nav{
            position:absolute;
            top:19px;
            right:6px;
            width:20px;
            height:18px;
        }
        .line{
            width:20px;
            height:3px;
            background:#ffffff;
            margin-bottom:4px;
        }
        /* 헤더의 끝 */

        /* tmp의 시작 */
        .tmp{
            position:fixed;
            top:19px;
            left:6px;
            z-index:2;
            width:80px;
            height:20px;
            background:#ff1800;
            border-radius:10px;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .tmp>a{
            font-size:10px;
            color:#ffffff;
            text-decoration:none;
        }
        /* tmp의 끝 */

        /* 슬라이더 시작 */
        .slider{
            position:relative;
            height:450px;
        }
        .slider-img>a>img{
            position:absolute;
            left:0;
            top:0;
            z-index:0;
        }
        .slider-img>a>.slider01{
            z-index:1;
        }
        .btn-page{
            position:absolute;
            z-index:2;
            bottom:30px;
            width:360px;
            text-align:center;
        }
        .btn-page>span{
            display:inline-block;
            width:10px;
            height:10px;
            background:#ffffff;
            border-radius:5px;
            margin:0 2px;
        }
        .btn-page>.active{
            background:#01c982;
        }
        /* 슬라이더 끝 */

        /* 링크아이콘들 시작 */
        .link-icons{
            width:360px;
            height:160px;
        }
        .link-icons>div{
            float:left;
            width:78px;
            margin-left:6px;
            margin-right:6px;
        }
        .link-icons>div>a{
            display:block;
        }
        .line-icon01>a>img{
            width:40px;
        }
        .line-icon02>a>img{
            width:38px;
        }
        .line-icon03>a>img{
            width:51px;
        }
        .line-icon04>a>img{
            width:52px;
        }
        /* 링크아이콘들 끝 */
    </style>
</head>
<body>
    <div class="wrap">
       <div class="header">
            <h1 class="logo">
                <a href="index.html">
                    HOLLYS
                </a>
            </h1>
            <div class="btn-nav">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </div>
       </div>
       <div class="slider">
           <div class="slider-img">
                <a href="#">
                    <img class="slider01" src="./images/slider01.jpg" alt="슬라이더1">
                </a>
                <a href="#">
                    <img class="slider02" src="./images/slider02.jpg" alt="슬라이더2">
                </a>
                <a href="#">
                    <img class="slider03" src="./images/slider03.jpg" alt="슬라이더3">
                </a>
                <a href="#">
                    <img class="slider04" src="./images/slider04.jpg" alt="슬라이더4">
                </a>
                <a href="#">
                    <img  class="slider05" src="./images/slider05.jpg" alt="슬라이더5">
                </a>
           </div>
           <div class="btn-page">
               <span class="active"></span>
               <span></span>
               <span></span>
               <span></span>
               <span></span>
           </div>
       </div>
       <div class="link-icons">
            <div class="line-icon01">
                <a href="#">
                    <img src="./images/mall.svg" alt="할리스 몰 바로가기">
                </a>
                <a href="#">
                    Hollys Mall
                </a>
            </div>
            <div class="line-icon02">
                <a href="#">
                    <img src="./images/menu.svg" alt="메뉴 바로가기">
                </a>
                <a href="#">
                    Menu
                </a>
            </div>
            <div class="line-icon03">
                <a href="#">
                    <img src="./images/store.svg" alt="스토어 바로가기">
                </a>
                <a href="#">
                    Store
                </a>
            </div>
            <div class="line-icon04">
                <a href="#">
                    <img src="./images/member.svg" alt="멤버십 바로가기">
                </a>
                <a href="#">
                    Membership
                </a>
            </div>           
       </div>
       <div class="banner">
           배너
       </div>
       <div class="notice">
           게시판
       </div>
       <div class="footer">
           푸터
       </div>
       <div class="tmp">
            <a href="#">
                창업설명회
            </a>           
       </div>
    </div>
</body>
</html>
